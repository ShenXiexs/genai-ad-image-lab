<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <defs>
    <linearGradient id="bg3" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#fbf7ef"/>
      <stop offset="50%" stop-color="#eef7f3"/>
      <stop offset="100%" stop-color="#eef2ff"/>
    </linearGradient>
    <filter id="shadow3" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="15" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow3" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M0,0 L14,7 L0,14 Z" fill="#334155"/>
    </marker>
    <style>
      .title { font: 800 44px "Avenir Next", "PingFang SC", "Helvetica Neue", Arial, sans-serif; fill: #111827; }
      .subtitle { font: 400 23px "Avenir Next", "PingFang SC", "Helvetica Neue", Arial, sans-serif; fill: #475569; }
      .box-title { font: 700 25px "Avenir Next", "PingFang SC", "Helvetica Neue", Arial, sans-serif; fill: #172033; }
      .body { font: 400 20px "Avenir Next", "PingFang SC", "Helvetica Neue", Arial, sans-serif; fill: #475569; }
      .small { font: 600 17px "Avenir Next", "PingFang SC", "Helvetica Neue", Arial, sans-serif; fill: #64748b; }
      .hyp { font: 700 22px "Avenir Next", "PingFang SC", "Helvetica Neue", Arial, sans-serif; fill: #0f172a; }
    </style>
  </defs>

  <rect width="1600" height="1000" fill="url(#bg3)"/>
  <circle cx="250" cy="820" r="205" fill="#fde68a" opacity="0.28"/>
  <circle cx="1360" cy="210" r="185" fill="#bfdbfe" opacity="0.42"/>

  <text x="78" y="88" class="title">核心假设模型：AI 来源 × 广告图创意取向</text>
  <text x="80" y="130" class="subtitle">同样是 AI 生成，产品诊断型、使用模拟型、情感象征型的心理路径不同</text>

  <g filter="url(#shadow3)">
    <rect x="80" y="195" width="330" height="260" rx="30" fill="#ffffff" opacity="0.94"/>
    <text x="122" y="250" class="box-title">创作来源</text>
    <rect x="120" y="290" width="250" height="54" rx="18" fill="#e0f2fe" stroke="#38bdf8"/>
    <text x="150" y="324" class="body">Human-created</text>
    <rect x="120" y="365" width="250" height="54" rx="18" fill="#dbeafe" stroke="#60a5fa"/>
    <text x="150" y="399" class="body">AI-generated</text>

    <rect x="80" y="530" width="330" height="310" rx="30" fill="#ffffff" opacity="0.94"/>
    <text x="122" y="585" class="box-title">创意取向 Moderator</text>
    <rect x="120" y="625" width="250" height="52" rx="17" fill="#fff7ed" stroke="#fb923c"/>
    <text x="145" y="658" class="body">Product-diagnostic</text>
    <rect x="120" y="695" width="250" height="52" rx="17" fill="#ecfdf5" stroke="#22c55e"/>
    <text x="145" y="728" class="body">Usage-simulation</text>
    <rect x="120" y="765" width="250" height="52" rx="17" fill="#fdf2f8" stroke="#ec4899"/>
    <text x="145" y="798" class="body">Affective-symbolic</text>
  </g>

  <line x1="430" y1="330" x2="565" y2="430" stroke="#334155" stroke-width="4" marker-end="url(#arrow3)"/>
  <line x1="430" y1="685" x2="565" y2="560" stroke="#334155" stroke-width="4" marker-end="url(#arrow3)"/>
  <text x="468" y="365" class="small">H1: interaction</text>

  <g filter="url(#shadow3)">
    <rect x="560" y="225" width="440" height="570" rx="34" fill="#ffffff" opacity="0.95"/>
    <text x="615" y="285" class="box-title">中介机制 Mediators</text>

    <rect x="620" y="330" width="320" height="70" rx="20" fill="#fff7ed" stroke="#fdba74" stroke-width="2"/>
    <text x="652" y="374" class="body">Perceived creator effort</text>

    <rect x="620" y="430" width="320" height="70" rx="20" fill="#fef2f2" stroke="#fca5a5" stroke-width="2"/>
    <text x="652" y="474" class="body">Authenticity / sincerity</text>

    <rect x="620" y="530" width="320" height="70" rx="20" fill="#ecfdf5" stroke="#86efac" stroke-width="2"/>
    <text x="652" y="574" class="body">Self-imagery / realism</text>

    <rect x="620" y="630" width="320" height="70" rx="20" fill="#eff6ff" stroke="#93c5fd" stroke-width="2"/>
    <text x="652" y="674" class="body">Visual quality / diversity</text>

    <text x="612" y="750" class="small">Product: clarity &amp; utility stronger</text>
    <text x="612" y="778" class="small">Affect: effort &amp; authenticity more fragile</text>
  </g>

  <line x1="1010" y1="510" x2="1158" y2="510" stroke="#334155" stroke-width="4" marker-end="url(#arrow3)"/>

  <g filter="url(#shadow3)">
    <rect x="1160" y="225" width="360" height="570" rx="34" fill="#ffffff" opacity="0.95"/>
    <text x="1212" y="285" class="box-title">结果变量 Outcomes</text>

    <rect x="1210" y="335" width="260" height="64" rx="20" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
    <text x="1252" y="376" class="body">Ad attitude</text>

    <rect x="1210" y="425" width="260" height="64" rx="20" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
    <text x="1244" y="466" class="body">Brand attitude</text>

    <rect x="1210" y="515" width="260" height="64" rx="20" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
    <text x="1240" y="556" class="body">Purchase intention</text>

    <rect x="1210" y="605" width="260" height="64" rx="20" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
    <text x="1254" y="646" class="body">Trust / CTR</text>
  </g>

  <rect x="120" y="885" width="1360" height="54" rx="27" fill="#ffffff" opacity="0.90" stroke="#cbd5e1"/>
  <text x="152" y="920" class="hyp">主假设：AI 来源效应不是均匀的；它会被创意取向调节，并通过努力、真实性、想象代入与质量/多样性机制影响广告效果。</text>
</svg>
